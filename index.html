    <script>
        function applyTheme(m) {
            if(m === 'dark') {
                document.body.classList.add('dark-mode');
            } else {
                document.body.classList.remove('dark-mode');
            }
        }
        function applySize(s) {
            document.body.classList.remove('font-small', 'font-medium', 'font-large');
            document.body.classList.add('font-' + s);
        }
    </script>
    <script>
    // 1. RUN IMMEDIATELY ON LOAD: Checks memory before the user sees the page
    (function() {
        const savedMode = localStorage.getItem('themeMode');
        const savedSize = localStorage.getItem('fontSize');
        if (savedMode === 'dark') { document.body.classList.add('dark-mode'); }
        if (savedSize) { document.body.classList.add('font-' + savedSize); }
    })();

    // 2. THEME SWITCHER: Saves choice to browser memory
    function applyTheme(m) {
        if (m === 'dark') {
            document.body.classList.add('dark-mode');
            localStorage.setItem('themeMode', 'dark');
        } else {
            document.body.classList.remove('dark-mode');
            localStorage.setItem('themeMode', 'light');
        }
    }

    // 3. FONT SIZE SWITCHER: Saves size to browser memory
    function applySize(s) {
        document.body.classList.remove('font-small', 'font-medium', 'font-large');
        document.body.classList.add('font-' + s);
        localStorage.setItem('fontSize', s);
    }
</script>
